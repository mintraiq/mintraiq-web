<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turbo-cache-control" content="no-cache">
    <title>MintrAIQ — Custom categories</title>
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <meta name="view-transition" content="same-origin">
</head>
<body data-portal-nav="settings" data-settings-nav="categories">
    <div class="dashboard-container">
        <div id="portal-sidebar-region" data-turbo-permanent>
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-shell">
                    <div id="portal-settings-nav-region" data-turbo-permanent>
                        <div id="settings-nav-root"></div>
                    </div>
                    <div class="portal-settings-body">
                        <div class="page-header">
                            <h1>Custom categories</h1>
                            <p>Optional: tap what matters so coaching sounds like your life, not a spreadsheet. Fine to skip — we learn as you go.</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-tags"></i>
                                <h3>AI categories preferences</h3>
                            </div>
                            <form data-settings-step="categories">
                                <input type="hidden" id="categoryInclude" name="preferred_categories" value="Dining Out, Groceries, Rent" />
                                <div class="form-group">
                                    <label>Tap categories that matter most to you</label>
                                    <div class="settings-chip-cloud">
                                        <button type="button" class="settings-chip is-selected" data-category-chip="Dining Out" aria-pressed="true">Dining Out</button>
                                        <button type="button" class="settings-chip is-selected" data-category-chip="Groceries" aria-pressed="true">Groceries</button>
                                        <button type="button" class="settings-chip is-selected" data-category-chip="Rent" aria-pressed="true">Rent</button>
                                        <button type="button" class="settings-chip" data-category-chip="Transport" aria-pressed="false">Transport</button>
                                        <button type="button" class="settings-chip" data-category-chip="Travel" aria-pressed="false">Travel</button>
                                        <button type="button" class="settings-chip" data-category-chip="Subscriptions" aria-pressed="false">Subscriptions</button>
                                        <button type="button" class="settings-chip" data-category-chip="Utilities" aria-pressed="false">Utilities</button>
                                        <button type="button" class="settings-chip" data-category-chip="Healthcare" aria-pressed="false">Healthcare</button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="categoryExclude">Blocked categories (optional)</label>
                                    <input id="categoryExclude" name="blocked_categories" class="form-control" placeholder="e.g. gambling, crypto" />
                                </div>
                                <label class="form-group" style="display:flex;align-items:center;gap:10px;cursor:pointer">
                                    <input type="checkbox" name="strict_category_matching" />
                                    <span>Use strict category matching when AI auto-labels transactions</span>
                                </label>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-page-boot.js"></script>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
</body>
</html>
