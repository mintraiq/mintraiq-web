<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turbo-cache-control" content="no-cache">
    <title>MintrAIQ — Banks &amp; income</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <meta name="view-transition" content="same-origin">
</head>
<body data-portal-nav="settings" data-settings-nav="banks">
    <div class="dashboard-container">
        <div id="portal-sidebar-region" data-turbo-permanent>
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-shell">
                    <div id="portal-settings-nav-region" data-turbo-permanent>
                        <div id="settings-nav-root"></div>
                    </div>
                    <div class="portal-settings-body">
                        <div class="page-header">
                            <h1>Banks &amp; income</h1>
                            <p>Connect accounts and map income sources.</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-university"></i>
                                <h3>Bank connectors (Akahu)</h3>
                            </div>
                            <form data-settings-step="banks">
                                <div class="form-grid-2">
                                    <label class="form-group">
                                        <span>Primary bank</span>
                                        <select name="primary_bank" class="form-control">
                                            <option value="ANZ">ANZ</option>
                                            <option value="ASB">ASB</option>
                                            <option value="BNZ">BNZ</option>
                                            <option value="Westpac">Westpac</option>
                                        </select>
                                    </label>
                                    <label class="form-group">
                                        <span>Connector status</span>
                                        <select name="akahu_status" class="form-control">
                                            <option value="disconnected">Disconnected</option>
                                            <option value="connected">Connected</option>
                                            <option value="reauth_required">Re-auth required</option>
                                        </select>
                                    </label>
                                    <label class="form-group">
                                        <span>Income account name</span>
                                        <input name="income_account_name" class="form-control" placeholder="Salary account" />
                                    </label>
                                    <label class="form-group">
                                        <span>Income source type</span>
                                        <select name="income_source_type" class="form-control">
                                            <option value="salary">Salary</option>
                                            <option value="business">Business income</option>
                                            <option value="mixed">Mixed</option>
                                        </select>
                                    </label>
                                </div>
                                <p style="color:var(--text-secondary);margin:8px 0 0">Akahu OAuth will be launched from this step once backend connector endpoints are enabled.</p>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
    <script type="module" src="./js/portal-page-boot.js"></script>
</body>
</html>
