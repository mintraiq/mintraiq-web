
<!DOCTYPE html>
<html lang="en">

{% extends "layout.html" %}
{% block content %}

<style>



    /* Main Upload Card Style */
    .upload-container {
        text-align: center;
        padding: 60px 20px;
        border: 2px dashed #333;
        transition: all 0.3s ease;
    }

    .upload-container:hover {
        border-color: var(--accent-green);
        background: rgba(0, 255, 157, 0.05);
    }

    .upload-icon {
        font-size: 4rem;
        color: var(--accent-green);
        margin-bottom: 20px;
        filter: drop-shadow(0 0 10px rgba(0, 255, 157, 0.2));
    }

    /* --- Stylized Input File Tag --- */
    .ninja-file-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 25px;
        background: rgba(47, 128, 237, 0.1); /* Blue accent from metrics */
        color: var(--accent-blue);
        border: 1px solid var(--accent-blue);
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .ninja-file-label:hover {
        background: var(--accent-blue);
        color: white;
    }

    /* Hiding the ugly browser default input */
    input[type="file"] {
        display: none;
    }

    .btn-ninja-upload {
        background-color: var(--accent-green);
        color: var(--bg-dark);
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: transform 0.2s;
    }

    .btn-ninja-upload:hover { transform: scale(1.05); }

    .action-group {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
    }

    #file-status {
        margin-top: 15px;
        font-size: 0.9rem;
        color: var(--text-secondary);
    }

    @media (max-width: 768px) {
        .action-group { flex-direction: column; align-items: center; gap: 15px; }
        .ninja-file-label, .btn-ninja-upload { width: 100%; justify-content: center; }
    }

    /* Responsive Upload Card Styling */
.upload-card {
    text-align: center;
    padding: 60px 20px;
    border: 2px dashed #333;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
}

.upload-card:hover {
    border-color: var(--accent-green);
    background: rgba(0, 255, 157, 0.02);
}

.main-icon {
    font-size: 4rem;
    color: var(--accent-green);
    margin-bottom: 20px;
    filter: drop-shadow(0 0 10px rgba(0, 255, 157, 0.3));
}

.upload-action-group {
    display: flex;
    flex-wrap: wrap; /* Allows buttons to stack on very small screens */
    justify-content: center;
    gap: 15px;
    margin-top: 25px;
}

.btn-select, .btn-upload {
    padding: 12px 25px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
    border: none;
}

.btn-select {
    background: rgba(0, 255, 157, 0.1);
    color: var(--accent-green);
    border: 1px solid var(--accent-green);
}

.btn-upload {
    background: var(--accent-green);
    color: var(--bg-dark);
}
.button-container {
        display: flex;
        gap: 15px; /* Adjust this value for more or less space */
        justify-content: center; /* Centers buttons on the page */
        margin-top: 15px;
    }

    /* Stack buttons vertically on mobile */
    @media (max-width: 768px) {
        .button-container {
            flex-direction: column;
            align-items: center;
        }
    }
.btn-select:hover, .btn-upload:hover {
    transform: scale(1.05);
}

/* Mobile Adjustments */
@media (max-width: 768px) {
    .upload-card {
        padding: 40px 15px;
        grid-column: span 1; /* Matches your dashboard.html mobile grid */
    }

    .main-icon {
        font-size: 3rem;
    }

    .upload-action-group {
        flex-direction: column; /* Stack buttons vertically on mobile */
        width: 100%;
    }
}</style>
<div class="grid-container">
    <div class="card upload-card grid-span-4" id="uploadArea">
        <div class="upload-content">
            <i class="fa-solid fa-file-invoice-dollar main-icon"></i>
            <h3>Upload Your Statements</h3>
            <p class="helper-text">Drag and drop JPG or PNG files here to let the AI process your expenses.</p>

            <div class="upload-action-group">
                <form method="POST" enctype="multipart/form-data">

                    <label for="statement-upload" class="ninja-file-label">
                    <i class="fas fa-plus"></i> Choose Files
                </label>
                <input id="statement-upload" name="files" type="file" multiple accept=".csv" onchange="showFiles()"/>

                <button class="btn-upload" id="submitUpload">
                    <i class="fas fa-cloud-upload-alt"></i> Upload
                </button>

                </form>
                <div id="file-status">No files selected</div>
            </div>

{% if success %}
  <p style="color:green;">Files uploaded successfully!</p>
{% endif %}
            </div>
   </div>
</div>
<script>
function showFiles() {
    const input = document.getElementById('statement-upload');
    const status = document.getElementById('file-status');
    if (input.files.length > 0) {
        status.innerHTML = `<span style="color: var(--accent-green)"><i class="fas fa-file-csv"></i> ${input.files.length} file(s) selected</span>`;
    }
}
</script>

{% endblock %}
