<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mintraiq-samples-base" content="../docs/samples">
    <title>Forecast — Ninja Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
</head>
<body data-active-nav="forecast">
<script src="../config/runtime-env.js"></script>
<div class="dashboard-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrap">
        <div class="mobile-bar">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;color:var(--accent-green)">Forecast</span>
        </div>
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h2 style="margin:0">Spending forecast</h2>
                    <p style="color:var(--text-secondary);margin-top:6px">React + Chart.js from <code style="color:var(--accent-purple)">docs/samples/dashboard.json</code> (no Flask iframe).</p>
                </div>
            </header>
            <p class="api-hint">Production: point this view at the same JSON your FastAPI <code>POST /generate</code> returns.</p>
            <div id="ninja-react-root" data-ninja-page="forecast" style="min-height:420px"></div>
        </main>
    </div>
</div>
<script src="../legacy/static-app/js/api-client.js"></script>
<script src="js/flask-shell-nav.js"></script>
<script type="module" src="../legacy/static-app/react-embed/ninja-ui.js"></script>
</body>
</html>
