
<!DOCTYPE html>


{% extends "layout.html" %}
{% block content %}



    <style>

       /* --- Ninja Scanner Specific Styles --- */
    .scanner-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    #video {
        width: 100%;
        max-width: 500px;
        border-radius: 15px;
        border: 2px solid var(--accent-blue);
        box-shadow: 0 0 20px rgba(47, 128, 237, 0.2);
        background: #000;
    }

    .camera-controls {
        display: flex;
        gap: 15px;
        width: 100%;
        justify-content: center;
    }

    /* Ninja Styled Buttons */
    .btn-ninja {
        padding: 12px 25px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-capture { background: var(--accent-blue); color: white; }
    .btn-upload { background: var(--accent-green); color: var(--bg-dark); }
    .btn-ninja:hover { transform: translateY(-2px); opacity: 0.9; }

    /* Data Table Styling */
    .ninja-table-container {
        width: 100%;
        overflow-x: auto;
        margin-top: 20px;
    }

    .ninja-table {
        width: 100%;
        border-collapse: collapse;
        color: var(--text-primary);
    }

    .ninja-table th {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-secondary);
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #333;
    }

    .ninja-table td {
        padding: 12px;
        border-bottom: 1px solid #222;
    }

    .status-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.8rem;
        background: rgba(0, 255, 157, 0.1);
        color: var(--accent-green);
    }

        /* Canvas Styling */
    .canvas-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #333;
    }

    .ninja-canvas {
        max-width: 100%;  /* Ensures it fits mobile screen width */
        height: auto;     /* Maintains aspect ratio */
        display: block;
        object-fit: contain;
    }

    /* Mobile Adjustments */
    @media (max-width: 768px) {
        #previewContainer {
            grid-column: span 1; /* Match the mobile grid pattern from dashboard.html */
            margin-top: 10px;
        }
    }
    </style>




<div class="grid-container">
    {% if progress %}
    <div class="card grid-span-2">
        <div class="card-header">
            <span class="card-title"><i class="fas fa-camera"></i> Receipt Scanner</span>
            <span class="status-badge">Live Feed</span>
        </div>

        <div class="scanner-container">
            <video id="video" autoplay playsinline></video>


            <div class="camera-controls">
                <button class="btn-ninja btn-capture" onclick="capture()">
                    <i class="fas fa-circle"></i> Capture
                </button>
                <button class="btn-ninja btn-upload" onclick="upload()">
                    <i class="fas fa-cloud-upload-alt"></i> Process AI
                </button>
            </div>
        </div>
    </div>
    {% endif %}
    <div class="card grid-span-2" id="previewContainer" style="display: none; animation-delay: 0.2s">
    <div class="card-header">
        <span class="card-title"><i class="fas fa-image"></i> Captured Image</span>
        <span class="status-badge" style="background: rgba(47, 128, 237, 0.1); color: var(--accent-blue);">High Res</span>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvas" class="ninja-canvas"></canvas>
    </div>

    <div class="canvas-actions" style="margin-top: 15px; display: flex; gap: 10px;">
        <button class="btn-ninja" onclick="retake()" style="background: rgba(255, 71, 87, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red);">
            <i class="fas fa-undo"></i> Retake
        </button>
    </div>
</div>

    <div class="card grid-span-2" id="resultCard" style="display: none;">
         <div class="card-header" style="animation-delay: 0.3s">
            <span class="card-title"><i class="fas fa-robot"></i> AI Extraction</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <p><strong>Merchant:</strong> <span id="merchant" style="color: var(--accent-blue)"></span></p>
            <p><strong>Total Amount:</strong> <span id="amount" style="color: var(--accent-green); font-weight: bold;"></span></p>
            <p><strong>AI Category:</strong> <span id="category" class="status-badge"></span></p>
        </div>
        <div class="card-header">
            <span class="card-title">Scanned Line Items</span>
        </div>

        <div class="ninja-table-container">
            <table class="ninja-table" id="linesTable">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th style="text-align: right;">Price</th>
                    </tr>
                </thead>
                <tbody id="linesTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>
<br>


<script src="/static/camera.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/service-worker.js');
}
</script>

{% endblock %}
