<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turbo-cache-control" content="no-cache">
    <title>MintrAIQ — Security</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <meta name="view-transition" content="same-origin">
</head>
<body data-portal-nav="settings" data-settings-nav="security">
    <div class="dashboard-container">
        <div id="portal-sidebar-region" data-turbo-permanent>
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-shell">
                    <div id="portal-settings-nav-region" data-turbo-permanent>
                        <div id="settings-nav-root"></div>
                    </div>
                    <div class="portal-settings-body">
                        <div class="page-header">
                            <h1>Security</h1>
                            <p>A calm checkpoint so your financial space stays yours. Adjust stricter controls whenever you like.</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-shield-alt"></i>
                                <h3>MFA configuration</h3>
                            </div>
                            <form data-settings-step="security">
                                <div class="form-grid-2">
                                    <label class="form-group">
                                        <span>Require MFA at sign-in</span>
                                        <select name="mfa_required" class="form-control">
                                            <option value="true">Yes</option>
                                            <option value="false">No</option>
                                        </select>
                                    </label>
                                    <label class="form-group">
                                        <span>Preferred MFA method</span>
                                        <select name="mfa_method" class="form-control">
                                            <option value="totp">Authenticator app (TOTP)</option>
                                            <option value="sms">SMS</option>
                                            <option value="email">Email code</option>
                                        </select>
                                    </label>
                                    <label class="form-group">
                                        <span>Recovery email</span>
                                        <input type="email" name="recovery_email" class="form-control" autocomplete="email" />
                                    </label>
                                    <label class="form-group">
                                        <span>Session timeout (minutes)</span>
                                        <input type="number" min="5" max="720" name="session_timeout_mins" class="form-control" value="60" />
                                    </label>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-page-boot.js"></script>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
</body>
</html>
