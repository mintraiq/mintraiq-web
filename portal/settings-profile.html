<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MintrAIQ — Personal profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <script src="../config/runtime-env.defaults.js"></script>
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
</head>
<body data-portal-nav="settings" data-settings-nav="profile">
    <div class="dashboard-container">
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-layout">
                    <aside class="portal-settings-sidebar"><div id="settings-nav-root"></div></aside>
                    <div class="portal-settings-main">
                        <div class="page-header">
                            <h1>Personal profile</h1>
                            <p>Manage your identity and base currency (preview — backend sync later).</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <i class="far fa-id-card"></i>
                                <h3>Identity</h3>
                            </div>
                            <form id="profileForm">
                                <div class="form-grid-2">
                                    <div class="form-group">
                                        <label for="profileName">Display name</label>
                                        <input type="text" id="profileName" class="form-control" autocomplete="name" required />
                                    </div>
                                    <div class="form-group">
                                        <label for="profileEmail">Email</label>
                                        <input type="email" id="profileEmail" class="form-control" disabled style="opacity:0.65" />
                                    </div>
                                    <div class="form-group">
                                        <label for="profileMobile">Mobile</label>
                                        <input type="text" id="profileMobile" class="form-control" autocomplete="tel" />
                                    </div>
                                    <div class="form-group">
                                        <label for="profileCurrency">Default currency</label>
                                        <select id="profileCurrency" class="form-control">
                                            <option value="NZD">NZD</option>
                                            <option value="AUD">AUD</option>
                                            <option value="USD">USD</option>
                                        </select>
                                    </div>
                                </div>
                                <div style="text-align:right;margin-top:20px">
                                    <button type="submit" class="btn-save">Save changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
    <script type="module" src="./settings-profile.js"></script>
</body>
</html>
