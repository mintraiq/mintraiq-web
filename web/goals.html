<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings goals — Ninja Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
</head>
<body data-active-nav="goals">
<script src="../config/runtime-env.js"></script>
<div class="dashboard-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrap">
        <div class="mobile-bar">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;color:var(--accent-green)">Goals</span>
        </div>
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h2 style="margin:0">Savings goals</h2>
                    <p style="color:var(--text-secondary);margin-top:6px">Flask <code style="color:var(--accent-purple)">POST /account/goals</code> → FastAPI <code>/users/savings-goal</code>.</p>
                </div>
            </header>
            <p class="api-hint">Request/response models: <a href="http://localhost:5000/api/docs" target="_blank" rel="noopener">/api/docs</a>.</p>

            <div class="card" style="max-width:560px">
                <div class="card-header"><span class="card-title"><i class="fas fa-bullseye"></i> Set your target</span></div>
                <form id="goalsForm">
                    <div class="form-group">
                        <label for="goalAmount">Goal amount ($)</label>
                        <input type="number" id="goalAmount" class="form-control" required step="0.01" placeholder="500">
                    </div>
                    <div class="form-group">
                        <label for="interval">Frequency</label>
                        <select id="interval" class="form-control">
                            <option value="monthly">Monthly</option>
                            <option value="weekly">Weekly</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-save">Save goal</button>
                </form>
                <div id="statusMsg" class="status-msg"></div>
            </div>
        </main>
    </div>
</div>
<script src="../legacy/static-app/js/api-client.js"></script>
<script src="js/flask-shell-nav.js"></script>
<script src="../legacy/static-app/js/goals-page.js"></script>
</body>
</html>
