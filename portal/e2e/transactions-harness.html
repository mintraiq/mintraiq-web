<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E — Transactions receipt harness</title>
    <link rel="stylesheet" href="../../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="../css/portal-app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-e2e-harness="transactions">
    <main class="main-content" style="max-width:960px;margin:0 auto;padding:24px">
        <h1 style="font-size:1.25rem;margin:0 0 8px">Transactions harness</h1>
        <p id="harnessMode" data-testid="harness-mode" style="color:var(--text-secondary);margin:0 0 16px"></p>
        <div id="txError" class="card" data-testid="tx-error-card" hidden style="margin-bottom:16px;padding:16px;border-color:rgba(255,71,87,0.45);color:#ffb4b4"></div>
        <div class="card" style="padding:16px;margin-bottom:16px">
            <table id="txTable" style="width:100%;border-collapse:collapse">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Description</th>
                        <th>Receipt</th>
                    </tr>
                </thead>
                <tbody id="txBody"></tbody>
            </table>
        </div>
        <div id="txExpanded" class="card" data-testid="tx-expanded-card" hidden style="padding:16px"></div>
        <p id="harnessError" data-testid="harness-error" hidden style="color:var(--accent-red)"></p>
    </main>
    <script type="module" src="./transactions-harness.js"></script>
</body>
</html>
