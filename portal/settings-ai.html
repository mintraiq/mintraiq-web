<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MintrAIQ — AI advisor settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
</head>
<body data-portal-nav="settings" data-settings-nav="ai">
    <div class="dashboard-container">
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-layout">
                    <aside class="portal-settings-sidebar"><div id="settings-nav-root"></div></aside>
                    <div class="portal-settings-main">
                        <div class="page-header">
                            <h1>AI advisor settings</h1>
                            <p>Tune how the AI interacts with your financial data.</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-robot"></i>
                                <h3>AI personality</h3>
                            </div>
                            <form id="aiSettingsForm">
                                <div class="form-group">
                                    <label for="aiTone">How should the AI talk to you?</label>
                                    <select id="aiTone" class="form-control">
                                        <option value="professional">Professional &amp; direct</option>
                                        <option value="encouraging">Encouraging &amp; gentle</option>
                                        <option value="strict">Strict &amp; disciplined</option>
                                    </select>
                                </div>
                                <div class="form-group" style="margin-top:20px">
                                    <label>
                                        <input type="checkbox" id="autoCategorize" checked style="margin-right:10px" />
                                        Allow AI to auto-correct my manual categorizations
                                    </label>
                                </div>
                                <div style="text-align:right;margin-top:20px">
                                    <button type="submit" class="btn-save">Update AI</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
    <script type="module" src="./js/settings-ai.js"></script>
</body>
</html>
