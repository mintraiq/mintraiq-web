 <div class="page-header">
            <h1>Personal Profile</h1>
            <p>Manage your identity, location, and base currency.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="far fa-id-card"></i><h3>Identity</h3>
            </div>
            <form id="profileForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="profileName" class="form-control" value="{{ user.name }}" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" value="{{ user.email }}" disabled style="opacity: 0.6;">
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" id="profileMobile" class="form-control" value="{{ user.mobile_number or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Default Currency</label>
                            <select id="profileCurrency" class="form-control">
                                <option value="NZD" {% if user.currency == 'NZD' %}selected{% endif %}>NZD ($) - New Zealand</option>
                                <option value="AUD" {% if user.currency == 'AUD' %}selected{% endif %}>AUD ($) - Australia</option>
                                <option value="USD" {% if user.currency == 'USD' %}selected{% endif %}>USD ($) - US Dollar</option>
                            </select>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="submit" class="btn-save">Save Changes</button>
                    <span id="profileStatus" style="color: var(--accent-green); margin-left: 10px; display: none;">Saved!</span>
                </div>
            </form>
        </div>
