<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turbo-cache-control" content="no-cache">
    <title>MintrAIQ — Alerts &amp; nudges</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <meta name="view-transition" content="same-origin">
</head>
<body data-portal-nav="settings" data-settings-nav="notifications">
    <div class="dashboard-container">
        <div id="portal-sidebar-region" data-turbo-permanent>
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-shell">
                    <div id="portal-settings-nav-region" data-turbo-permanent>
                        <div id="settings-nav-root"></div>
                    </div>
                    <div class="portal-settings-body">
                        <div class="page-header">
                            <h1>Alerts &amp; nudges</h1>
                            <p>Gentle heads-ups when something drifts — or keep things quiet. You can tune this later; skipping is OK.</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-bell"></i>
                                <h3>Alerts &amp; nudges channels</h3>
                            </div>
                            <form data-settings-step="notifications">
                                <p style="color:var(--text-secondary);margin:0 0 16px">Notification preferences sync with your API and drive workspace nudges.</p>
                                <div class="form-grid-2">
                                    <label class="form-group" style="display:flex;align-items:center;gap:10px;cursor:pointer">
                                        <input type="checkbox" name="weekly_summary_enabled" checked />
                                        <span>Weekly summary digest</span>
                                    </label>
                                    <label class="form-group" style="display:flex;align-items:center;gap:10px;cursor:pointer">
                                        <input type="checkbox" name="spend_spike_alert_enabled" checked />
                                        <span>Spend spike alert</span>
                                    </label>
                                    <label class="form-group" style="display:flex;align-items:center;gap:10px;cursor:pointer">
                                        <input type="checkbox" name="goal_risk_alert_enabled" checked />
                                        <span>Savings goal risk alert</span>
                                    </label>
                                    <label class="form-group">
                                        <span>Primary delivery channel</span>
                                        <select name="primary_delivery_channel" class="form-control">
                                            <option value="in_app">In-app</option>
                                            <option value="email">Email</option>
                                            <option value="both">Both</option>
                                        </select>
                                    </label>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
    <script type="module" src="./js/portal-page-boot.js"></script>
</body>
</html>
