<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly expenses — MintrAIQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static-app/css/shell.css">
</head>
<body data-active-nav="monthly">
<script src="../../config/runtime-env.defaults.js"></script>
<script src="../../config/runtime-env.js"></script>
<div class="dashboard-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrap">
        <div class="mobile-bar">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;color:var(--accent-green)">Monthly</span>
        </div>
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h2 style="margin:0">Monthly expense list</h2>
                    <p style="color:var(--text-secondary);margin-top:6px">Same DataTables source as Transactions: <code style="color:var(--accent-purple)">/list/monthly_expenses</code></p>
                </div>
            </header>
            <div class="card">
                <p id="monthlyStatus" style="color:var(--text-secondary);margin-bottom:8px">Loading…</p>
                <div style="overflow-x:auto">
                    <table class="ninja-table" id="monthlyTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Description</th>
                                <th>Category</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="../static-app/js/api-client.js"></script>
<script src="../static-app/js/sidebar-nav.js"></script>
<script src="../static-app/js/expenses-monthly.js"></script>
</body>
</html>
