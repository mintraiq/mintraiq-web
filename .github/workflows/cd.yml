name: CD - Build & Deploy Portal

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target deployment environment'
        required: true
        default: 'STAGING'
        type: choice
        options:
          - STAGING
          - PROD

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build runtime env + React embed
        env:
          PUBLIC_LOGTO_ENDPOINT: ${{ vars.PUBLIC_LOGTO_ENDPOINT }}
          PUBLIC_LOGTO_APP_ID: ${{ vars.PUBLIC_LOGTO_APP_ID }}
          PUBLIC_LOGTO_REGISTER_URL: ${{ vars.PUBLIC_LOGTO_REGISTER_URL }}
          PUBLIC_FINANCE_API_BASE: ${{ vars.PUBLIC_FINANCE_API_BASE }}
          PUBLIC_FINANCE_API_BASE_STAGING: ${{ vars.PUBLIC_FINANCE_API_BASE_STAGING }}
          PUBLIC_FINANCE_API_BASE_PROD: ${{ vars.PUBLIC_FINANCE_API_BASE_PROD }}
          PUBLIC_FORECAST_API_BASE_STAGING: ${{ vars.PUBLIC_FORECAST_API_BASE_STAGING }}
          PUBLIC_FORECAST_API_BASE_PROD: ${{ vars.PUBLIC_FORECAST_API_BASE_PROD }}
          PUBLIC_AGENT_API_BASE_STAGING: ${{ vars.PUBLIC_AGENT_API_BASE_STAGING }}
          PUBLIC_AGENT_API_BASE_PROD: ${{ vars.PUBLIC_AGENT_API_BASE_PROD }}
          PUBLIC_SURVEY_URL_STAGING: ${{ vars.PUBLIC_SURVEY_URL_STAGING }}
          PUBLIC_SURVEY_URL_PROD: ${{ vars.PUBLIC_SURVEY_URL_PROD }}
          PUBLIC_FINANCE_API_RESOURCE: ${{ vars.PUBLIC_FINANCE_API_RESOURCE }}
          PUBLIC_SIGN_IN_REDIRECT_URI: ${{ vars.PUBLIC_SIGN_IN_REDIRECT_URI }}
          PUBLIC_LEGACY_FLASK_BASE: ${{ vars.PUBLIC_LEGACY_FLASK_BASE }}
          PUBLIC_FASTAPI_DOCS_URL: ${{ vars.PUBLIC_FASTAPI_DOCS_URL }}
          PUBLIC_FEATURE_RECEIPT_SCANNER: ${{ vars.PUBLIC_FEATURE_RECEIPT_SCANNER }}
          PUBLIC_OCR_SCANNER_API_URL: ${{ vars.PUBLIC_OCR_SCANNER_API_URL }}
          PUBLIC_OCR_SCANNER_API_URL_PROD: ${{ vars.PUBLIC_OCR_SCANNER_API_URL_PROD }}
          PUBLIC_OCR_SCANNER_API_RESOURCE: ${{ vars.PUBLIC_OCR_SCANNER_API_RESOURCE }}
          PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          PUBLIC_REQUIRE_BILLING_PAYWALL: ${{ vars.PUBLIC_REQUIRE_BILLING_PAYWALL }}
        run: npm run build

      - name: Deploy to Vercel
        if: vars.DEPLOY_TO_VERCEL == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
