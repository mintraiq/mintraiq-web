<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MintrAIQ — Legal & Terms</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <meta name="view-transition" content="same-origin">
</head>
<body data-portal-nav="settings" data-settings-nav="legal">
    <div class="dashboard-container">
        <div id="portal-sidebar-region" data-turbo-permanent>
            <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-shell">
                    <div id="portal-settings-nav-region" data-turbo-permanent>
                        <div id="settings-nav-root"></div>
                    </div>
                    <div class="portal-settings-body">
                        <div class="page-header">
                            <h1>Legal & Terms</h1>
                            <p>
                                This is a standard compliance pattern in FinTech: acceptance is captured once during onboarding, while terms remain accessible here at any time.
                            </p>
                        </div>
                        <p id="legalAgreementBadge" class="legal-agreement-badge" role="status"></p>
                        <p id="legalStatus" style="color:var(--text-secondary);font-size:0.85rem;margin:0 0 12px;min-height:1.2em"></p>
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-file-contract"></i>
                                <h3>Terms of service</h3>
                            </div>
                            <div id="legalTos" class="legal-tos-host legal-pre" aria-live="polite"></div>
                        </div>
                        <div class="card" style="margin-top:14px">
                            <div class="card-header">
                                <i class="fas fa-scale-balanced"></i>
                                <h3>Disclaimer</h3>
                            </div>
                            <p id="legalDisclaimer" style="white-space:pre-wrap;color:var(--text-secondary)"></p>
                        </div>
                        <div class="card" style="margin-top:14px">
                            <div class="card-header">
                                <i class="fas fa-message"></i>
                                <h3>Insights footer</h3>
                            </div>
                            <p id="legalInsightsFooter" class="nz-ai-disclaimer"></p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
    <script type="module" src="./js/settings-legal.js"></script>
</body>
</html>
