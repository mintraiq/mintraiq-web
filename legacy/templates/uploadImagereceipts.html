
<!DOCTYPE html>
<html lang="en">

{% extends "layout.html" %}

{% block content %}
<div id="processingOverlay">
   <div class="ninja-loader">
        <i class="fas fa-user-ninja fa-4x" style="color: var(--accent-green); filter: drop-shadow(0 0 15px var(--accent-green));"></i>
    </div>

    <div class="scanner-container" style="position: relative; width: 300px; height: 150px; margin: 30px 0; border: 1px solid #333; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.02);">
        <div class="laser-line"></div>
        <div style="display: flex; flex-direction: column; gap: 10px; padding: 20px;">
            <div style="width: 80%; height: 8px; background: #222; border-radius: 4px;"></div>
            <div style="width: 60%; height: 8px; background: #222; border-radius: 4px;"></div>
            <div style="width: 90%; height: 8px; background: #222; border-radius: 4px;"></div>
        </div>
    </div>

    <h3 id="statusText" style="color: var(--accent-green); font-family: 'Courier New', monospace; letter-spacing: 2px;">INITIALIZING SCAN...</h3>

    <div style="width: 250px; height: 4px; background: #333; border-radius: 2px; margin-top: 20px; overflow: hidden;">
        <div id="progressBar" style="width: 0%; height: 100%; background: var(--accent-green); transition: width 0.3s ease;"></div>
    </div>
</div>
<style>



    /* Main Upload Card Style */
    .upload-container {
        text-align: center;
        padding: 60px 20px;
        border: 2px dashed #333;
        transition: all 0.3s ease;
    }

    .upload-container:hover {
        border-color: var(--accent-green);
        background: rgba(0, 255, 157, 0.05);
    }

    .upload-icon {
        font-size: 4rem;
        color: var(--accent-green);
        margin-bottom: 20px;
        filter: drop-shadow(0 0 10px rgba(0, 255, 157, 0.2));
    }

    /* --- Stylized Input File Tag --- */


    .ninja-file-label:hover {
        background: var(--accent-blue);
        color: white;
    }

    /* Hiding the ugly browser default input */
    input[type="file"] {
        display: none;
    }

    .btn-ninja-upload {
        background-color: var(--accent-green);
        color: var(--bg-dark);
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: transform 0.2s;
    }

    .btn-ninja-upload:hover { transform: scale(1.05); }

    .action-group {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
    }

    #file-status {
        margin-top: 15px;
        font-size: 0.9rem;
        color: var(--text-secondary);
    }

    @media (max-width: 768px) {
        .action-group { flex-direction: column; align-items: center; gap: 15px; }
        .ninja-file-label, .btn-ninja-upload { width: 100%; justify-content: center; }
    }

    /* Responsive Upload Card Styling */
.upload-card {
    text-align: center;
    padding: 60px 20px;
    border: 2px dashed #333;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
}

.upload-card:hover {
    border-color: var(--accent-green);
    background: rgba(0, 255, 157, 0.02);
}

.main-icon {
    font-size: 4rem;
    color: var(--accent-green);
    margin-bottom: 20px;
    filter: drop-shadow(0 0 10px rgba(0, 255, 157, 0.3));
}

.upload-action-group {
    display: flex;
    flex-wrap: wrap; /* Allows buttons to stack on very small screens */
    justify-content: center;
    gap: 15px;
    margin-top: 25px;
}

.btn-select, .btn-upload {
    padding: 12px 25px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
    border: none;
}

.btn-select {
    background: rgba(0, 255, 157, 0.1);
    color: var(--accent-green);
    border: 1px solid var(--accent-green);
}

.btn-upload {
    background: var(--accent-green);
    color: var(--bg-dark);
}
.button-container {
        display: flex;
        gap: 15px; /* Adjust this value for more or less space */
        justify-content: center; /* Centers buttons on the page */
        margin-top: 15px;
    }

    /* Stack buttons vertically on mobile */
    @media (max-width: 768px) {
        .button-container {
            flex-direction: column;
            align-items: center;
        }
    }
.btn-select:hover, .btn-upload:hover {
    transform: scale(1.05);
}

/* Mobile Adjustments */
@media (max-width: 768px) {
    .upload-card {
        padding: 40px 15px;
        grid-column: span 1; /* Matches your dashboard.html mobile grid */
    }

    .main-icon {
        font-size: 3rem;
    }

    .upload-action-group {
        flex-direction: column; /* Stack buttons vertically on mobile */
        width: 100%;
    }
    }

/* --- Ninja Processing Overlay --- */
    #processingOverlay {
        display: none; /* Hidden by default */
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(18, 18, 18, 0.9);
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(8px);
    }

    .scanner-line {
        width: 300px;
        height: 2px;
        background: var(--accent-green);
        box-shadow: 0 0 15px var(--accent-green);
        position: relative;
        animation: scanMove 2s infinite ease-in-out;
    }

    @keyframes scanMove {
        0% { transform: translateY(-50px); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(50px); opacity: 0; }
    }

    .loading-text {
        margin-top: 20px;
        color: var(--accent-green);
        font-family: 'Courier New', monospace;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    /* Progress Bar container */
    .progress-container {
        width: 250px;
        height: 4px;
        background: #333;
        border-radius: 10px;
        margin-top: 15px;
        overflow: hidden;
    }

    .progress-fill {
        width: 0%;
        height: 100%;
        background: var(--accent-green);
        transition: width 0.4s ease;
    }







    /* Fixed Animation Keyframes */
    .laser-line {
        position: absolute;
        width: 100%;
        height: 3px;
        background: var(--accent-green);
        box-shadow: 0 0 20px var(--accent-green);
        top: 0;
        animation: scanLoop 2.5s infinite ease-in-out;
    }

    @keyframes scanLoop {
        0% { top: 0%; opacity: 0; }
        50% { top: 100%; opacity: 1; }
        100% { top: 0%; opacity: 0; }
    }

    .ninja-loader { animation: pulseNinja 2s infinite; }
    @keyframes pulseNinja {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
    }

    /* Ninja Style Input File */
    .ninja-file-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 25px;
        background: rgba(47, 128, 237, 0.1);
        color: var(--accent-blue);
        border: 1px solid var(--accent-blue);
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    input[type="file"] { display: none; }
</style>

<div class="grid-container">
    <div class="card upload-card grid-span-4" id="uploadArea">
        <div class="upload-content">
            <i class="fa-solid fa-file-invoice-dollar main-icon"></i>
            <h3>Upload Your Receipts</h3>
            <p class="helper-text">Drag and drop JPG or PNG files here to let the AI process your expenses.</p>

            <div class="upload-action-group">

                    <label for="receipt-upload" class="ninja-file-label">
                    <i class="fas fa-plus"></i> Choose Files
                </label>
                <input id="receipt-upload" name="files" type="file" multiple accept=".PDF/JPG/JPEG/PNG" onchange="showFiles()"/>

                <button class="btn-ninja btn-upload" onclick="triggerAIProcessing()">
                    <i class="fas fa-cloud-upload-alt"></i> Process AI
                </button>

               <div id="file-status">No files selected</div>
            </div>



  <div class="card grid-span-2" id="resultCard" style="display: none;">
         <div class="card-header" style="animation-delay: 0.3s">
            <span class="card-title"><i class="fas fa-robot"></i> AI Extraction</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <p><strong>Merchant:</strong> <span id="merchant" style="color: var(--accent-blue)"></span></p>
            <p><strong>Total Amount:</strong> <span id="amount" style="color: var(--accent-green); font-weight: bold;"></span></p>
            <p><strong>AI Category:</strong> <span id="category" class="status-badge"></span></p>
        </div>
        <div class="card-header">
            <span class="card-title">Scanned Line Items</span>
        </div>

        <div class="ninja-table-container">
            <table class="ninja-table" id="linesTable">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th style="text-align: right;">Price</th>
                    </tr>
                </thead>
                <tbody id="linesTableBody">
                    </tbody>
            </table>
        </div>
    </div>
            </div>
   </div>
</div>

<script src="/static/upload.js"></script>
<script>
function showFiles() {
    const input = document.getElementById('receipt-upload');
    const status = document.getElementById('file-status');
    if (input.files.length > 0) {
        status.innerHTML = `<span style="color: var(--accent-green)"><i class="fas fa-file-csv"></i> ${input.files.length} file(s) selected</span>`;
    }
}

function startUpload() {
    // 1. Show the overlay
    document.getElementById('processingOverlay').style.display = 'flex';

    // 2. Simulate progress (or link to your AJAX progress)
    let progress = 0;
    const bar = document.getElementById('progressBar');
    const status = document.getElementById('statusText');

    const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 95) progress = 95; // Wait at 95% for actual response
        bar.style.width = progress + "%";

        if(progress > 30) status.innerText = "Extracting Totals...";
        if(progress > 60) status.innerText = "Categorizing Expense...";
    }, 400);

    // 3. Trigger your actual upload function (from your existing camera.js)
    upload().then(() => {
        clearInterval(interval);
        bar.style.width = "100%";
        setTimeout(() => {
            document.getElementById('processingOverlay').style.display = 'none';
        }, 500);
    }).catch(() => {
        clearInterval(interval);
        document.getElementById('processingOverlay').style.display = 'none';
        alert("Processing Failed");
    });
}

async function triggerAIProcessing() {
    const overlay = document.getElementById('processingOverlay');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('progressBar');

    if (document.getElementById('receipt-upload').files.length === 0) {
        alert("Please select a file first!");
        return;
    }

    // 1. SHOW OVERLAY FIRST
    overlay.style.display = 'flex';

    // 2. FORCE BROWSER REFLOW
    // This ensures the animation starts BEFORE the network request blocks the thread
    await new Promise(resolve => requestAnimationFrame(resolve));

    let progress = 0;
    statusText.innerText = "ESTABLISHING CONNECTION...";

    // 3. START PROGRESS TRACKER
    const interval = setInterval(() => {
        if (progress < 95) { // Leave 5% for the final server "handshake"
            progress += (95 - progress) * 0.05; // Ease-out: gets slower as it nears the end
            progressBar.style.width = progress + '%';

            if (progress > 10) statusText.innerText = "UPLOADING TO NINJA SERVER...";
            if (progress > 40) statusText.innerText = "AI EXTRACTING DATA...";
            if (progress > 70) statusText.innerText = "FINALIZING ANALYSIS...";
        }
    }, 800);

    try {
        // 4. THE LONG WAIT
        // Ensure upload() is an 'async' function that uses 'fetch' or 'XMLHttpRequest'
        const response = await upload();

        // 5. SUCCESS
        clearInterval(interval);
        progressBar.style.width = '100%';
        statusText.innerText = "SCAN COMPLETE!";
        statusText.style.color = "var(--accent-green)";

        setTimeout(() => {
            overlay.style.display = 'none';
            // Trigger any UI updates here
        }, 1200);

    } catch (error) {
        clearInterval(interval);
        statusText.innerText = "CONNECTION TIMEOUT";
        statusText.style.color = "var(--accent-red)";
        console.error("Upload Error:", error);
        setTimeout(() => overlay.style.display = 'none', 3000);
    }
}
</script>

{% endblock %}
