
<!DOCTYPE html>

<html lang="en">

{% extends "layout.html" %}
{% block content %}
<head>
   <meta charset="UTF-8">
   <title>DataTables with Flask and MongoDB</title>
   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
   <link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/dataTables.bootstrap4.min.css">
   <style>
        * {
            margin: 0;
            padding: 0;
        }
        .imgbox {
            display: grid;
            height: 100%;
        }
        .center-fit {
            max-width: 100%;
            max-height: 100vh;
            margin: auto;
        }
    </style>
</head>
<body>

<div class="container mt-5">
Welcome to expense management

   <img class="container mt-5" src="/static/financial.png" alt="expenses" />

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.10.21/js/dataTables.bootstrap4.min.js"></script>

{{ script|safe }}
<script>
   $('#exportButton').on('click', function() {
      var table = $('#{{ table_id }}').DataTable();
      var searchValue = table.search();
      var order = table.order();

      var params = $.param({
         'search[value]': searchValue,
         'order[0][column]': order[0][0],
         'order[0][dir]': order[0][1]
      });

      window.location.href = "/export/mac_db?" + params;
   });
</script>
</body>
{% endblock content %}
</html>
