
<!DOCTYPE html>
<html lang="en">

{% extends "layout.html" %}
{% block content %}
<head>
   <meta charset="UTF-8">
   <title>DataTables with Flask and MongoDB</title>
   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
   <link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/dataTables.bootstrap4.min.css">
</head>
<body>
<script src="http://code.jquery.com/jquery-1.9.1.js"></script>
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<div class="container mt-5">
   <div class="card">
      <div class="card-header">
         <h3 class="card-title">Display Dashboard</h3>
      </div>
       <div class="input-daterange .datepicker row align-items-center">




       <div class="col">
           <div class="form-group">
               <div class="input-group input-group-alternative">

                   <input class="form-control"  name = "startDate" id="startDate" placeholder="Start date" type="date" >

                   <input class="form-control"  name="endDate" id="endDate" placeholder="End date" type="date" >

               </div>
           </div>

           <button  onclick="popup()">
             Launch Dash App
           </button>
       </div>




   </div>
   </div>
</div>
{% if success %}


<div class="container mt-5">

   <div class="card">
      <div class="card-header">
         <h3 class="card-title">{{ table_title }}</h3>
      </div>
      <div class="card-body">
         <table id="{{ table_id }}" class="table table-striped table-bordered" style="width:100%">
            <thead>
            <tr>
               {% for column in columns %}
               <th>{{ column|capitalize }}</th>
               {% endfor %}
            </tr>
            </thead>
            <tbody></tbody>
         </table>
         <button id="exportButton" class="btn btn-dark">Export to Excel</button>
      </div>
   </div>
</div>
{% endif %}
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.10.21/js/dataTables.bootstrap4.min.js"></script>
<script>
   window.onload = function (){
     var date = new Date();

     var firstDay = new Date(date.getFullYear(), date.getMonth(), 1);
     var lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
     document.getElementById("startDate").value = firstDay.getFullYear() + '-' + ('0' + (firstDay.getMonth() + 1)).slice(-2) + '-' + ('0' + firstDay.getDate()).slice(-2);
     var date = new Date();
     var lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
     document.getElementById("endDate").value = lastDay.getFullYear() + '-' + ('0' + (lastDay.getMonth() + 1)).slice(-2) + '-' + ('0' + lastDay.getDate()).slice(-2);

   }
  function popup() {
     window.open('/dash?startDate='+document.getElementById("startDate").value+'&endDate='+document.getElementById("endDate").value, 'DashApp', 'width=1200,height=800'); return false;
    }

</script>
{{ script|safe }}

<script>
   $('#exportButton').on('click', function() {
      var table = $('#{{ table_id }}').DataTable();
      var searchValue = table.search();
      var order = table.order();

      var params = $.param({
         'search[value]': searchValue,
         'order[0][column]': order[0][0],
         'order[0][dir]': order[0][1]
      });

      window.location.href = "/export/mac_db?" + params;
   });

</script>
</body>
{% endblock content %}
</html>
