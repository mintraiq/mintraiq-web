<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan receipts — Ninja Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
</head>
<body data-active-nav="scan">
<script src="../config/runtime-env.js"></script>
<div class="dashboard-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrap">
        <div class="mobile-bar">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;color:var(--accent-green)">Scan</span>
        </div>
        <main class="main-content">
            <header class="top-header"><div><h2 style="margin:0">Scan receipts</h2></div></header>
            <div class="card">
                <p style="color:var(--text-secondary);line-height:1.6;margin-bottom:12px">Flask route: <code style="color:var(--accent-purple)">GET /camera</code> → <code>scanuploadreceipts.html</code>. Open the live app while migrating camera UI.</p>
                <p class="api-hint" style="font-size:0.85rem;color:var(--text-secondary)">Static preview only. Base: <code id="flaskBaseHint"></code></p>
            </div>
        </main>
    </div>
</div>
<script src="../legacy/static-app/js/api-client.js"></script>
<script src="js/flask-shell-nav.js"></script>
<script>
    document.getElementById('flaskBaseHint').textContent =
        (window.__MINTRAIQ_ENV__ && window.__MINTRAIQ_ENV__.legacyFlaskBase) || 'http://127.0.0.1:5000';
</script>
</body>
</html>
