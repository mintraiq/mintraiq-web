<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turbo-cache-control" content="no-cache">
    <title>MintrAIQ — Transactions</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* First-paint guard: Font Awesome CDN can block later CSS; keep layout stable before icons load. */
        body[data-portal-nav="transactions"] .main-content:not(.main-content--settings) {
            max-width: 1320px;
            width: 100%;
            margin-inline: auto;
            box-sizing: border-box;
        }
        body[data-portal-nav="transactions"] .transactions-toolbar-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        body[data-portal-nav="transactions"] .transactions-toolbar-grid.tx-filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        body[data-portal-nav="transactions"] .tx-toolbar-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
        }
        body[data-portal-nav="transactions"] #txClearFilters {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            font-size: 0.88rem;
            font-weight: 600;
            line-height: 1.25;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.14);
        }
        body[data-portal-nav="transactions"] #txClearFilters:hover {
            background: rgba(255, 255, 255, 0.14);
        }
        /* First-paint: keep title + actions on one row; stable button chrome (avoid btn-primary / wrap FOUC). */
        body[data-portal-nav="transactions"] .top-header .header-right {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            gap: 10px;
        }
        body[data-portal-nav="transactions"] .tx-action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.2;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            box-sizing: border-box;
        }
        body[data-portal-nav="transactions"] .tx-action-btn--reload {
            background: var(--accent-green, #00ff9d);
            color: #0a0a0a;
        }
        body[data-portal-nav="transactions"] .tx-action-btn--sync {
            background: linear-gradient(135deg, var(--accent-purple, #bb6bd9), var(--accent-blue, #2f80ed));
            color: #fff;
        }
        @media (min-width: 640px) {
            body[data-portal-nav="transactions"] .top-header {
                flex-wrap: nowrap;
                align-items: center;
            }
            body[data-portal-nav="transactions"] .top-header .header-left {
                min-width: 0;
                flex: 1 1 auto;
            }
            body[data-portal-nav="transactions"] .top-header .header-right {
                flex: 0 0 auto;
            }
        }
    </style>
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <meta name="view-transition" content="same-origin">
</head>
<body data-portal-nav="transactions">
    <div class="dashboard-container">
        <div id="portal-sidebar-region" data-turbo-permanent>
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <a href="./dashboard.html" class="mobile-bar-brand"><img src="../assets/mintr-leaf-mark.png" alt="" aria-hidden="true" class="brand-leaf" width="16" height="24"><span>Mintr<span class="gradient-text">AIQ</span></span></a>
            </div>
            <main class="main-content">
                <header class="top-header">
                    <div class="header-left">
                        <h2 style="margin:0;font-size:1.75rem">Transactions</h2>
                        <p style="margin:6px 0 0;color:var(--text-secondary);font-size:0.95rem">Review your latest activity, sync your bank, and tag categories.</p>
                    </div>
                    <div class="header-right">
                        <button type="button" class="tx-action-btn tx-action-btn--reload" id="txReload" title="Reload">
                            <i class="fas fa-rotate"></i> Reload
                        </button>
                        <button type="button" class="tx-action-btn tx-action-btn--sync" id="txSyncAkahu">
                            <i class="fas fa-cloud-download-alt"></i> Sync Akahu
                        </button>
                    </div>
                </header>
                <p id="txStatus" style="color:var(--text-secondary);font-size:0.85rem;margin:-8px 0 12px;min-height:1.2em"></p>
                <div id="txError" class="card" style="display:none;margin-bottom:16px;padding:16px;border-color:rgba(255,71,87,0.45);color:#ffb4b4"></div>

                <div class="card transactions-toolbar tx-toolbar-card" style="margin-bottom:16px;padding:16px 18px">
                    <div class="transactions-toolbar-top">
                        <label class="tx-show-entries" for="txPageSize">
                            Show
                            <select id="txPageSize" class="form-control tx-mini-control">
                                <option value="10">10</option>
                                <option value="25">25</option>
                                <option value="50" selected>50</option>
                                <option value="100">100</option>
                            </select>
                            entries
                        </label>
                        <div class="form-group tx-search-wrap" style="margin-bottom:0;min-width:220px">
                            <label for="txSearch">Search</label>
                            <input type="search" id="txSearch" class="form-control" placeholder="Search all columns…" autocomplete="off" />
                        </div>
                    </div>
                    <div class="transactions-toolbar-grid tx-filter-grid">
                        <div class="form-group tx-date-group" style="margin-bottom:0;min-width:180px">
                            <label for="txDateFrom">From</label>
                            <input type="date" id="txDateFrom" class="form-control" />
                        </div>
                        <div class="form-group tx-date-group" style="margin-bottom:0;min-width:180px">
                            <label for="txDateTo">To</label>
                            <input type="date" id="txDateTo" class="form-control" />
                        </div>
                        <div class="form-group" style="margin-bottom:0;flex:1;min-width:220px">
                            <label for="txDescription">Description</label>
                            <input type="search" id="txDescription" class="form-control" placeholder="Filter description..." autocomplete="off" />
                        </div>
                        <div class="form-group" style="margin-bottom:0;min-width:160px">
                            <label for="txCategory">Category</label>
                            <select id="txCategory" class="form-control">
                                <option value="">All categories</option>
                            </select>
                        </div>
                        <label class="tx-review-check">
                            <input type="checkbox" id="txReviewOnly" />
                            <span>Needs review only</span>
                        </label>
                        <button type="button" id="txClearFilters" class="tx-clear-filters">
                            <i class="fas fa-filter-circle-xmark"></i> Clear filters
                        </button>
                    </div>
                    <p id="txSyncHint" style="margin:12px 0 0;font-size:0.82rem;color:var(--text-secondary)"></p>
                </div>

                <div class="tx-spend-hero" id="txSpendHero" aria-live="polite"></div>

                <div class="tx-view-tabs" role="tablist" aria-label="Transaction view">
                    <button type="button" class="tx-view-tab is-active" id="txViewList" role="tab" aria-selected="true" data-view="list">
                        <i class="fas fa-list-ul"></i> List
                    </button>
                    <button type="button" class="tx-view-tab" id="txViewCategories" role="tab" aria-selected="false" data-view="categories">
                        <i class="fas fa-chart-pie"></i> By category
                    </button>
                </div>

                <div id="txBulkReviewBar" class="tx-bulk-review-bar" hidden>
                    <label class="tx-bulk-select-all">
                        <input type="checkbox" id="txSelectAllReview" />
                        <span>Select all on page</span>
                    </label>
                    <span id="txSelectedCount" class="tx-bulk-count">0 selected</span>
                    <button type="button" class="tx-action-btn tx-action-btn--reload" id="txBulkDismiss">
                        <i class="fas fa-check-double"></i> Mark reviewed (no training)
                    </button>
                </div>

                <div class="card tx-list-card" id="txListCard" style="margin-bottom:16px">
                    <div class="card-header tx-list-header">
                        <span class="card-title">All movements</span>
                        <div class="tx-list-meta">
                            <span id="txCount" class="tx-count-main">0 shown</span>
                            <span id="txCountSub" class="tx-count-sub"></span>
                        </div>
                    </div>
                    <div class="tx-table-wrap">
                        <table class="ninja-table" id="txTable">
                            <thead>
                                <tr>
                                    <th><button type="button" class="tx-sort-btn" data-sort-key="date">Date <span class="tx-sort-indicator" data-sort-indicator="date"></span></button></th>
                                    <th class="align-right"><button type="button" class="tx-sort-btn tx-sort-btn-right" data-sort-key="amount">Amount <span class="tx-sort-indicator" data-sort-indicator="amount"></span></button></th>
                                    <th><button type="button" class="tx-sort-btn" data-sort-key="description">Description <span class="tx-sort-indicator" data-sort-indicator="description"></span></button></th>
                                    <th><button type="button" class="tx-sort-btn" data-sort-key="category">Category <span class="tx-sort-indicator" data-sort-indicator="category"></span></button></th>
                                    <th><button type="button" class="tx-sort-btn" data-sort-key="flag">Flag <span class="tx-sort-indicator" data-sort-indicator="flag"></span></button></th>
                                    <th><button type="button" class="tx-sort-btn" data-sort-key="needs_review">Review <span class="tx-sort-indicator" data-sort-indicator="needs_review"></span></button></th>
                                    <th><button type="button" class="tx-sort-btn" data-sort-key="type">Type <span class="tx-sort-indicator" data-sort-indicator="type"></span></button></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <nav class="tx-pagination" id="txPagination" aria-label="Transaction pages"></nav>
                </div>

                <div class="card tx-category-card-wrap" id="txCategoryPanel" hidden style="margin-bottom:16px">
                    <div class="card-header tx-category-header">
                        <span class="card-title">Spend by category</span>
                        <span id="txCategoryHint" class="tx-category-hint">Click a slice or card to drill down</span>
                    </div>
                    <div class="tx-category-layout">
                        <div class="tx-donut-panel" id="txDonutPanel"></div>
                        <div class="tx-category-grid" id="txCategoryGrid"></div>
                    </div>
                    <div class="tx-category-drill" id="txCategoryDrill" hidden></div>
                </div>

                <div id="txDetail" class="card" style="display:none"></div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/turbo-workspace-boot.js"></script>
</body>
</html>
