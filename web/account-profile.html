<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Ninja Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
</head>
<body data-active-nav="account">
<script src="../config/runtime-env.defaults.js"></script>
<script src="../config/runtime-env.js"></script>
<div class="dashboard-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrap">
        <div class="mobile-bar">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;color:var(--accent-green)">Profile</span>
        </div>
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h2 style="margin:0">Profile (FastAPI)</h2>
                    <p style="color:var(--text-secondary);margin-top:6px">Flask <code style="color:var(--accent-purple)">PUT /users/me1</code> proxies to your AI URL <code>/api/users/me</code>. Align body with OpenAPI.</p>
                </div>
            </header>
            <p class="api-hint"><a href="http://localhost:5000/api/docs" target="_blank" rel="noopener">http://localhost:5000/api/docs</a></p>

            <div class="card" style="max-width:520px">
                <form id="profileForm">
                    <div class="form-group">
                        <label for="profileName">Name</label>
                        <input type="text" id="profileName" class="form-control" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="profileEmail">Email</label>
                        <input type="email" id="profileEmail" class="form-control" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="profilePhone">Mobile</label>
                        <input type="tel" id="profilePhone" class="form-control" autocomplete="tel">
                    </div>
                    <div class="form-group">
                        <label for="profileCurrency">Currency</label>
                        <input type="text" id="profileCurrency" class="form-control" value="USD" maxlength="8">
                    </div>
                    <button type="submit" class="btn-save">Save profile</button>
                </form>
                <div id="profileStatus" class="status-msg"></div>
            </div>
        </main>
    </div>
</div>
<script src="../legacy/static-app/js/api-client.js"></script>
<script src="js/flask-shell-nav.js"></script>
<script src="../legacy/static-app/js/account-profile.js"></script>
</body>
</html>
