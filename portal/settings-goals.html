<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="turbo-cache-control" content="no-cache">
    <title>MintrAIQ — Savings goals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../legacy/static-app/css/shell.css">
    <link rel="stylesheet" href="./css/portal-app.css">
    <script src="../config/runtime-env.js"></script>
    <script src="./env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <meta name="view-transition" content="same-origin">
</head>
<body data-portal-nav="settings" data-settings-nav="goals">
    <div class="dashboard-container">
        <div id="portal-sidebar-region" data-turbo-permanent>
        <aside class="sidebar" id="app-sidebar"><div id="portal-nav-root"></div></aside>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="main-wrap">
            <div class="mobile-bar">
                <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                <span style="font-weight:600;color:var(--accent-green)">MintrAIQ</span>
            </div>
            <main class="main-content main-content--settings">
                <div class="portal-settings-shell">
                    <div id="portal-settings-nav-region" data-turbo-permanent>
                        <div id="settings-nav-root"></div>
                    </div>
                    <div class="portal-settings-body">
                        <div class="page-header">
                            <h1>Savings goals</h1>
                            <p>No perfect answer needed — even a rough aim helps us steer nudges toward what you care about. Skip or come back when you are ready.</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-bullseye"></i>
                                <h3>Savings goals &amp; income baseline</h3>
                            </div>
                            <form data-settings-step="goals">
                                <input type="hidden" name="goals_package" value="home" />
                                <div class="settings-preset-grid" style="margin-bottom:16px">
                                    <button type="button" class="settings-preset-btn is-selected" data-goal-preset="home">Save for a home</button>
                                    <button type="button" class="settings-preset-btn" data-goal-preset="debt">Get out of debt</button>
                                    <button type="button" class="settings-preset-btn" data-goal-preset="wealth">Build long-term wealth</button>
                                </div>
                                <div class="form-grid-2">
                                    <label class="form-group">
                                        <span>Monthly income target</span>
                                        <input type="number" min="0" step="1" name="monthly_income_target" class="form-control" />
                                    </label>
                                    <label class="form-group">
                                        <span>Monthly savings goal</span>
                                        <input type="number" min="0" step="1" name="monthly_savings_goal" class="form-control" />
                                    </label>
                                    <label class="form-group">
                                        <span>Emergency fund target</span>
                                        <input type="number" min="0" step="1" name="emergency_fund_target" class="form-control" />
                                    </label>
                                    <label class="form-group">
                                        <span>Primary income source</span>
                                        <input name="primary_income_source" class="form-control" placeholder="Employer or source" />
                                    </label>
                                </div>
                                <p style="color:var(--text-secondary);margin:6px 0 0">Pick a preset, then fine-tune if needed. You can skip this for now and calibrate later.</p>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="./js/portal-page-boot.js"></script>
    <script type="module" src="./js/portal-nav.js"></script>
    <script type="module" src="./js/portal-settings-nav.js"></script>
</body>
</html>
