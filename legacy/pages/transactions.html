<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions — MintrAIQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static-app/css/shell.css">
</head>
<body data-active-nav="transactions">
<script src="../../config/runtime-env.js"></script>
<div class="dashboard-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrap">
        <div class="mobile-bar">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;color:var(--accent-green)">Transactions</span>
        </div>
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h2 style="margin:0">Transactions</h2>
                    <p style="color:var(--text-secondary);margin-top:6px;font-size:0.95rem">Flask <code style="color:var(--accent-purple)">GET /list/monthly_expenses</code> (DataTables JSON).</p>
                </div>
            </header>
            <p class="api-hint">See request/response shapes in your Flask helpers and <a href="http://localhost:5000/api/docs" target="_blank" rel="noopener" style="color:var(--accent-blue)">/api/docs</a> for FastAPI.</p>
            <div class="card">
                <div class="card-header"><span class="card-title">Expense rows</span></div>
                <p id="tableStatus" style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:8px">Loading…</p>
                <div style="overflow-x:auto">
                    <table class="ninja-table" id="transactionsTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th class="align-right">Amount</th>
                                <th>Description</th>
                                <th>Category</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="../static-app/js/api-client.js"></script>
<script src="../static-app/js/sidebar-nav.js"></script>
<script src="../static-app/js/transactions-table.js"></script>
</body>
</html>
