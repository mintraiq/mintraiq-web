<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload CSV — MintrAIQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static-app/css/shell.css">
</head>
<body data-active-nav="upload">
<script src="../../config/runtime-env.js"></script>
<div class="dashboard-container">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrap">
        <div class="mobile-bar">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;color:var(--accent-green)">Upload</span>
        </div>
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h2 style="margin:0">Upload bank CSV</h2>
                    <p style="color:var(--text-secondary);margin-top:6px">Flask <code style="color:var(--accent-purple)">POST /upload</code> multipart field <code>files</code> (see <code>expense_loader.upload</code>).</p>
                </div>
            </header>
            <div class="card" style="max-width:520px">
                <form id="csvUploadForm">
                    <div class="form-group">
                        <label for="file">CSV file</label>
                        <input type="file" name="files" id="file" accept=".csv" required>
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-upload"></i> Upload</button>
                </form>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:16px;line-height:1.5">
                    You must be logged into Flask in the same browser session. The form action uses <code>legacyFlaskBase</code> from <code>config/runtime-env.js</code>.
                </p>
            </div>
        </main>
    </div>
</div>
<script src="../static-app/js/api-client.js"></script>
<script src="../static-app/js/sidebar-nav.js"></script>
<script src="../static-app/js/upload-form.js"></script>
</body>
</html>
