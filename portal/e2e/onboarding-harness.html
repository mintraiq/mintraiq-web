<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E — Onboarding intake/connect harness</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/portal-app.css">
    <link rel="stylesheet" href="../css/onboarding.css">
</head>
<!--
  Renders the onboarding surfaces with no auth and no network, so the layout,
  tokens, focus order and reduced-motion behaviour can be driven without a
  Supabase session. Mirrors the existing *-harness.html pattern.
  ?view=intake | connect
-->
<body class="onb-page" data-e2e-harness="onboarding">
<main class="onb-shell">
    <div class="onb-progress">
        <div class="onb-progress-track">
            <div class="onb-progress-fill"
                 id="harnessProgressFill"
                 role="progressbar"
                 aria-valuemin="1"
                 aria-valuemax="3"
                 aria-valuenow="1"
                 aria-label="Question progress"
                 style="width:33%"></div>
        </div>
        <small class="onb-progress-caption" id="harnessProgressCaption">Question 1 of 3</small>
    </div>

    <header>
        <h1 class="onb-title" id="harnessTitle" tabindex="-1">…</h1>
        <p class="onb-subtitle" id="harnessSubtitle"></p>
    </header>

    <div class="onb-options" id="harnessOptions" role="radiogroup" aria-labelledby="harnessTitle"></div>

    <p class="onb-error" id="harnessError" role="alert"></p>

    <div class="onb-actions">
        <button type="button" class="onb-skip" id="harnessSkip">Skip</button>
    </div>
</main>
<script type="module" src="./onboarding-harness.js"></script>
</body>
</html>
